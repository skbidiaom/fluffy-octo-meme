<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 3D R6 Multiplayer Game - Classroom Edition</title>
    <!-- PeerJS for WebRTC P2P Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        
        .overlay-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; color: white; backdrop-filter: blur(5px);
        }
        #pause-menu { display: none; background: rgba(0, 0, 0, 0.6); z-index: 90; }
        
        .menu-box {
            background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 12px;
            border: 2px solid #555; text-align: center; max-width: 400px; width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .menu-box h1 { margin-top: 0; font-size: 36px; text-shadow: 2px 2px 4px #000; }
        
        input[type="text"], input[type="number"] {
            width: 90%; padding: 12px; margin: 8px 0; font-size: 18px; border-radius: 6px;
            border: none; text-align: center; font-weight: bold; background: #ddd;
        }
        .row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        
        .menu-btn {
            flex: 1; padding: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
            background: #3399ff; color: white; border: 2px solid #fff; border-radius: 6px; transition: 0.2s;
        }
        .menu-btn:hover { background: #2277cc; transform: scale(1.02); }
        
        #error-msg { color: #ff5555; font-weight: bold; margin-top: 10px; min-height: 20px; }
        #loading-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 110; color: white; font-size: 24px; justify-content: center; align-items: center; }

        #hud-top { position: absolute; top: 10px; right: 15px; text-align: right; z-index: 10; text-shadow: 1px 1px 2px black; color: white; font-weight: bold; }
        #invite-display { font-size: 18px; margin-bottom: 5px; color: #ffea00; }
        #fps-counter { font-size: 16px; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background-color: white; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 10; box-shadow: 0 0 2px black; }
        
        #instructions { position: absolute; top: 10px; left: 10px; color: white; font-size: 14px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; display: none; line-height: 1.5; }

        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 10px; z-index: 10;
        }
        .hotbar-slot {
            width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 3px solid #555;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 12px; text-align: center; position: relative;
        }
        .hotbar-slot.active { border-color: #ffea00; background: rgba(50,50,0,0.8); }
        .hotbar-slot span { position: absolute; top: 2px; left: 4px; color: #ccc; font-size: 10px; }

        #chat-container { position: absolute; top: 10px; left: 10px; width: 350px; height: 300px; display: flex; flex-direction: column; justify-content: flex-end; z-index: 15; pointer-events: none; display: none; }
        #chat-messages { overflow-y: hidden; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
        .chat-line { color: white; font-size: 15px; font-weight: bold; word-wrap: break-word; animation: fadeOut 10s forwards; }
        .chat-name { color: #aaffaa; }
        .chat-sys { color: #ffffaa; font-style: italic; }
        #chat-input-wrapper { display: none; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 4px; pointer-events: auto; }
        #chat-input { width: 100%; background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; outline: none; }
        
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; display: none; } }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay-menu">
        <div class="menu-box">
            <h1>R6 Multiplayer</h1>
            <input type="text" id="username-input" placeholder="Username (Try miss_trunchbull)" maxlength="16" value="Student">
            <div class="row">
                <button id="host-btn" class="menu-btn" style="background:#28a745;">Host Lobby</button>
                <input type="number" id="max-players" value="4" min="2" max="10" style="width: 60px;" title="Max Players">
            </div>
            <div style="margin: 15px 0; border-top: 1px solid #555; position: relative;">
                <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,1); padding: 0 10px; color: #888; font-size: 14px;">OR</span>
            </div>
            <div class="row">
                <input type="text" id="join-code" placeholder="Invite Code" maxlength="5" style="text-transform: uppercase;">
                <button id="join-btn" class="menu-btn">Join Lobby</button>
            </div>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="loading-overlay">Connecting...</div>

    <div id="pause-menu" class="overlay-menu">
        <div class="menu-box">
            <h1>Paused</h1>
            <button id="resume-btn" class="menu-btn">Resume</button>
            <button id="reset-btn" class="menu-btn" style="background:#cc3333; margin-top:15px;">Reset Character</button>
        </div>
    </div>

    <div id="hud-top">
        <div id="invite-display"></div>
        <div id="fps-counter">FPS: 0</div>
    </div>
    
    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-wrapper"><input type="text" id="chat-input" placeholder="Press Enter to chat..." maxlength="100" autocomplete="off"></div>
    </div>

    <div id="hotbar">
        <div class="hotbar-slot" id="slot-1"><span>1</span><div id="slot-name">Item</div></div>
    </div>

    <div id="crosshair"></div>
    <div id="instructions">
        WASD - Move | RIGHT CLICK - Turn<br>
        SHIFT - Shift-Lock | SCROLL - Zoom<br>
        1 - Equip Item | LEFT CLICK - Use Item<br>
        E - Sit in Chair<br>
        '/' or ENTER - Chat | ESC - Menu
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // --- SAFE AUDIO SYSTEM ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSoundSafe(callback) {
            if (!audioCtx) return;
            try { callback(); } catch(e) { console.warn("Audio play failed", e); }
        }

        function playJumpSound() {
            playSoundSafe(() => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            });
        }

        function playOofSound() {
            playSoundSafe(() => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            });
        }

        function playWhipSound() {
            playSoundSafe(() => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);

                setTimeout(() => {
                    if(!audioCtx) return;
                    const bufferSize = audioCtx.sampleRate * 0.2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                    const nGain = audioCtx.createGain(); noise.connect(nGain); nGain.connect(audioCtx.destination);
                    nGain.gain.setValueAtTime(1, audioCtx.currentTime); nGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    noise.start();
                }, 100);
            });
        }

        function playEatSound() {
            playSoundSafe(() => {
                for(let j=0; j<3; j++) {
                    setTimeout(() => {
                        if(!audioCtx) return;
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'square'; osc.frequency.setValueAtTime(150 + Math.random()*50, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                    }, j * 100);
                }
            });
        }

        // --- GAME CONSTANTS & STATE ---
        const STATE = { IDLE: 0, RUN: 1, JUMP: 2, FALL: 3, SWIM: 4, CLIMB: 5, SIT: 6 };
        let gameActive = false, isPaused = false, isDead = false, username = "Guest";
        let isTrunchbull = false;
        let currentMap = "none"; 
        let localAvatar = null; 
        window.chairPositions = []; // Global to track seat locations

        // --- MULTIPLAYER ---
        let peer = null, isHost = false, myPeerId = "", hostConn = null, clientConns = [], maxPlayers = 4;
        const remotePlayers = {}; 
        let networkTickRate = 50; 

        function generateCode() { return Math.random().toString(36).substring(2, 7).toUpperCase(); }
        function showLoading(show, text="Connecting...") { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; document.getElementById('loading-overlay').innerText = text; }
        function showError(msg) { document.getElementById('error-msg').innerText = msg; showLoading(false); }

        document.getElementById('host-btn').addEventListener('click', () => {
            initAudio();
            username = document.getElementById('username-input').value || "Host";
            maxPlayers = parseInt(document.getElementById('max-players').value) || 4;
            isTrunchbull = (username.toLowerCase() === 'miss_trunchbull');
            
            showLoading(true, "Creating Lobby...");
            myPeerId = generateCode(); peer = new Peer(myPeerId + "-r6clone");
            peer.on('open', () => { isHost = true; safeStartGame(myPeerId); });
            peer.on('connection', (conn) => {
                if (clientConns.length >= maxPlayers - 1) { conn.on('open', () => { conn.send({ type: 'error', msg: 'Lobby is full.' }); setTimeout(()=>conn.close(), 500); }); return; }
                conn.on('data', (data) => handleNetworkData(data, conn.peer));
                conn.on('close', () => removePlayer(conn.peer));
                clientConns.push(conn); addSystemChat("A player joined.");
            });
            peer.on('error', () => { showError("Failed to host (Code might be in use)."); if(peer) peer.destroy(); });
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            initAudio();
            username = document.getElementById('username-input').value || "Guest";
            let code = document.getElementById('join-code').value.toUpperCase();
            isTrunchbull = (username.toLowerCase() === 'miss_trunchbull');
            if (code.length !== 5) { showError("Enter a valid 5-letter code."); return; }
            
            showLoading(true, "Joining Lobby...");
            peer = new Peer(); 
            peer.on('open', (id) => {
                isHost = false; myPeerId = id; hostConn = peer.connect(code + "-r6clone");
                hostConn.on('open', () => { safeStartGame(code); addSystemChat("Connected to Lobby."); });
                hostConn.on('data', (data) => handleNetworkData(data, hostConn.peer));
                hostConn.on('close', () => { addSystemChat("Host disconnected."); setTimeout(() => location.reload(), 3000); });
            });
            peer.on('error', () => { showError("Could not connect. Invalid Code or Host left."); if(peer) peer.destroy(); });
        });

        function broadcast(data) {
            if (isHost) clientConns.forEach(c => { if(c.open) c.send(data); });
            else if (hostConn && hostConn.open) hostConn.send(data);
        }

        function handleNetworkData(data, senderId) {
            if (data.type === 'error') { alert(data.msg); location.reload(); return; }
            if (isHost && data.type !== 'chat') { clientConns.forEach(c => { if (c.peer !== senderId && c.open) c.send(data); }); }

            if (data.type === 'state') {
                if (data.id === myPeerId) return; 
                if (!remotePlayers[data.id]) {
                    const av = buildAvatar(data.name || "Guest"); 
                    scene.add(av.group);
                    if (data.equip) setAvatarEquip(av, data.equip); 
                    remotePlayers[data.id] = { avatar: av, targetPos: new THREE.Vector3().fromArray(data.pos), targetRot: data.rot, state: data.state, isDead: false, name: data.name };
                    updateMapContext(); 
                } else {
                    const p = remotePlayers[data.id];
                    if (!p.isDead) { p.targetPos.fromArray(data.pos); p.targetRot = data.rot; p.state = data.state; }
                    if (p.avatar.equipped !== data.equip) setAvatarEquip(p.avatar, data.equip);
                }
            } 
            else if (data.type === 'chat') { appendChat(data.name, data.text); if (isHost) broadcast(data); } 
            else if (data.type === 'death') { if (remotePlayers[data.id] && !remotePlayers[data.id].isDead) { executeBreakApart(remotePlayers[data.id].avatar); remotePlayers[data.id].isDead = true; } }
            else if (data.type === 'respawn') { if (remotePlayers[data.id]) { executeRespawn(remotePlayers[data.id].avatar); remotePlayers[data.id].isDead = false; } }
            else if (data.type === 'action') {
                if (remotePlayers[data.id]) {
                    remotePlayers[data.id].avatar.actionTimer = 0.5; 
                    if (data.action === 'eat') playEatSound();
                    if (data.action === 'whip') playWhipSound();
                }
            }
        }

        function removePlayer(id) {
            if (remotePlayers[id]) { scene.remove(remotePlayers[id].avatar.group); delete remotePlayers[id]; addSystemChat("A player left."); }
            if (isHost) clientConns = clientConns.filter(c => c.peer !== id);
            updateMapContext(); 
        }

        setInterval(() => {
            if (!gameActive || !localAvatar) return;
            broadcast({ type: 'state', id: myPeerId, name: username, pos: localAvatar.group.position.toArray(), rot: localAvatar.group.rotation.y, state: playerState, equip: localAvatar.equipped });
        }, networkTickRate);

        // --- CHAT SYSTEM ---
        const chatInput = document.getElementById('chat-input'), chatInputWrapper = document.getElementById('chat-input-wrapper'), chatMessages = document.getElementById('chat-messages');
        let chatFocused = false;
        function addSystemChat(msg) { const div = document.createElement('div'); div.className = 'chat-line chat-sys'; div.innerText = msg; chatMessages.appendChild(div); if(chatMessages.children.length > 8) chatMessages.firstChild.remove(); }
        function appendChat(name, text) { const div = document.createElement('div'); div.className = 'chat-line'; div.innerHTML = `<span class="chat-name">[${name}]:</span> ${text}`; chatMessages.appendChild(div); if(chatMessages.children.length > 8) chatMessages.firstChild.remove(); }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if ((e.key === 'Enter' || e.key === '/') && !chatFocused) { e.preventDefault(); chatFocused = true; chatInputWrapper.style.display = 'block'; chatInput.focus(); keys.w=keys.a=keys.s=keys.d=keys.space=false; return; }
            if (e.key === 'Enter' && chatFocused) {
                e.preventDefault(); const text = chatInput.value.trim();
                if (text.length > 0) { appendChat(username, text); broadcast({ type: 'chat', name: username, text: text }); }
                chatInput.value = ''; chatInput.blur(); chatInputWrapper.style.display = 'none'; chatFocused = false;
            }
            if (e.key === 'Escape' && chatFocused) { chatInput.value = ''; chatInput.blur(); chatInputWrapper.style.display = 'none'; chatFocused = false; }
        });

        // --- INIT THREE.JS & ASSETS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 22); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 50, 20); dirLight.castShadow = true;
        dirLight.shadow.camera.left = -60; dirLight.shadow.camera.right = 60;
        dirLight.shadow.camera.top = 60; dirLight.shadow.camera.bottom = -60;
        scene.add(dirLight);

        // --- PROCEDURAL TEXTURES ---
        function createGridTexture() {
            const cvs = document.createElement('canvas'); cvs.width = cvs.height = 128; const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#4a7a4a'; ctx.fillRect(0, 0, 128, 128); ctx.strokeStyle = '#3a5a3a'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 128, 128);
            const tex = new THREE.CanvasTexture(cvs); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }
        function createWoodTexture() {
            const cvs = document.createElement('canvas'); cvs.width = cvs.height = 256; const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#8B5A2B'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#6B3A0B'; ctx.lineWidth = 2;
            for(let i=0; i<256; i+=32) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke(); }
            const tex = new THREE.CanvasTexture(cvs); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }
        function createBrickTexture() {
            const cvs = document.createElement('canvas'); cvs.width = cvs.height = 256; const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#A0522D'; ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#ccc';
            for(let y=0; y<256; y+=32) { ctx.fillRect(0, y, 256, 4); for(let x=0; x<256; x+=64) { ctx.fillRect(x + (y%64===0?0:32), y, 4, 32); } }
            const tex = new THREE.CanvasTexture(cvs); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }
        function createFaceTexture(isStrict) {
            const cvs = document.createElement('canvas'); cvs.width = cvs.height = 256; const ctx = cvs.getContext('2d');
            ctx.fillStyle = isStrict ? '#fcdebb' : '#dddddd'; ctx.fillRect(0, 0, 256, 256); ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.ellipse(90, 105, 12, 22, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(166, 105, 12, 22, 0, 0, Math.PI * 2); ctx.fill();
            if (isStrict) {
                ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(70, 70); ctx.lineTo(110, 85); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(186, 70); ctx.lineTo(146, 85); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(100, 150); ctx.lineTo(156, 150); ctx.stroke(); 
            } else {
                ctx.beginPath(); ctx.arc(128, 130, 40, 0.15 * Math.PI, 0.85 * Math.PI); ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.stroke(); 
            }
            return new THREE.CanvasTexture(cvs);
        }
        function createShirtTexture(isCamp) {
            const cvs = document.createElement('canvas'); cvs.width = cvs.height = 256; const ctx = cvs.getContext('2d');
            if (isCamp) {
                ctx.fillStyle = '#7a8a60'; ctx.fillRect(0, 0, 256, 256); 
                ctx.fillStyle = '#4a2f1d'; ctx.fillRect(0, 200, 256, 30); 
                ctx.fillStyle = '#ffd700'; ctx.fillRect(110, 195, 36, 40); 
                ctx.fillStyle = '#4a2f1d'; ctx.fillRect(118, 203, 20, 24); 
            } else {
                ctx.fillStyle = '#222'; ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = '#eee'; ctx.fillRect(80, 0, 96, 256); 
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.moveTo(80, 0); ctx.lineTo(176, 0); ctx.lineTo(128, 60); ctx.fill();
                ctx.fillStyle = '#555'; ctx.fillRect(85, 0, 5, 256); ctx.fillRect(166, 0, 5, 256);
            }
            return new THREE.CanvasTexture(cvs);
        }

        const gridTex = createGridTexture(); const woodTex = createWoodTexture(); const brickTex = createBrickTexture();
        const faceNoob = createFaceTexture(false); const faceStrict = createFaceTexture(true);
        const shirtNoob = createShirtTexture(false); const shirtCamp = createShirtTexture(true);

        // --- SAFE MAP SYSTEM ---
        const envGroup = new THREE.Group(); scene.add(envGroup);

        function updateMapContext() {
            let trunchbullExists = isTrunchbull;
            for (let id in remotePlayers) { 
                if (remotePlayers[id].name && remotePlayers[id].name.toLowerCase() === 'miss_trunchbull') {
                    trunchbullExists = true; 
                } 
            }
            
            const targetMap = trunchbullExists ? 'hall' : 'pool';
            if (currentMap !== targetMap) {
                currentMap = targetMap;
                buildMap(currentMap);
            }
        }

        function buildMap(type) {
            while(envGroup.children.length > 0) { envGroup.remove(envGroup.children[0]); }
            window.chairPositions = []; // Reset chair locations

            if (type === 'pool') {
                scene.background.setHex(0x87CEEB);
                gridTex.repeat.set(50, 50); const gMat = new THREE.MeshStandardMaterial({ map: gridTex });
                const buildF = (w, h, x, z) => { const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), gMat); m.rotation.x = -Math.PI/2; m.position.set(x, 0, z); m.receiveShadow = true; let cTex = gridTex.clone(); cTex.repeat.set(w/2, h/2); m.material = new THREE.MeshStandardMaterial({map: cTex}); envGroup.add(m); }
                buildF(200, 90, 0, -55); buildF(200, 90, 0, 55); buildF(90, 20, -55, 0); buildF(90, 20, 55, 0);   
                
                const pf = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), gMat); pf.rotation.x = -Math.PI/2; pf.position.set(0, -10, 0);
                let pfTex = gridTex.clone(); pfTex.repeat.set(10, 10); pf.material = new THREE.MeshStandardMaterial({map: pfTex}); envGroup.add(pf);

        function executeBreakApart(av) {

        let shiftLock = false; let rightClickDown = false;

        window.addEventListener('keydown', (e) => {

        document.addEventListener('mousemove', (e) => {

        function toggleShiftLock() {

        // --- PHYSICS & LOGIC ---
        const vel = new THREE.Vector3(); const moveSpeed = 15; const jumpPower = 20; const gravity = 50;
        let isGrounded = false; let playerState = STATE.IDLE;
        
        function getGroundHeight(x, z) {
            if (currentMap === 'hall') { if (x > -20 && x < 20 && z > -50 && z < -30) return 3; return 0; } 
            else { if (x > -10 && x < 10 && z > -10 && z < 10) return -10; return 0; }
        }

        const clock = new THREE.Clock();

        function updateDeathPhysics(av, dt) {
            if (!av || !av.explosionData) return;
            av.explosionData.forEach(part => {
                if (part.vel.lengthSq() > 0) {
                    part.vel.y -= gravity * dt; part.mesh.position.addScaledVector(part.vel, dt);
                    part.mesh.rotation.x += part.rotVel.x * dt; part.mesh.rotation.y += part.rotVel.y * dt; part.mesh.rotation.z += part.rotVel.z * dt;
                    const gy = getGroundHeight(part.mesh.position.x, part.mesh.position.z);
                    if (part.mesh.position.y <= gy + 0.5) { part.mesh.position.y = gy + 0.5; part.vel.set(0,0,0); part.rotVel.set(0,0,0); }
                }
            });
        }

        function updatePhysics(dt) {
            if (!gameActive || !localAvatar) return;
            for (let id in remotePlayers) {
                let p = remotePlayers[id];
                if (p.isDead) { updateDeathPhysics(p.avatar, dt); } 
                else {
                    p.avatar.group.position.lerp(p.targetPos, 10 * dt);
                    let diff = p.targetRot - p.avatar.group.rotation.y;
                    while(diff < -Math.PI) diff += Math.PI * 2; while(diff > Math.PI) diff -= Math.PI * 2;
                    p.avatar.group.rotation.y += diff * 10 * dt;
                }
            }

            if (isDead) { updateDeathPhysics(localAvatar, dt); return; }

            // Handle Sitting Bypass
            if (playerState === STATE.SIT) {
                vel.set(0,0,0);
                isGrounded = true;
                if (keys.space && !isPaused && !chatFocused) {
                    playerState = STATE.JUMP; vel.y = jumpPower; keys.space = false;
                }
                return; // Prevent normal WASD movement while seated
            }

            let px = localAvatar.group.position.x; let pz = localAvatar.group.position.z; let py = localAvatar.group.position.y;
            const inPoolHole = currentMap === 'pool' && (px > -10 && px < 10 && pz > -10 && pz < 10);
            const inWater = inPoolHole && py < -1; 
            const onLadder = inPoolHole && pz < -9 && pz > -11 && px > -2 && px < 2;
            const nearEdge = inPoolHole && (px < -8.5 || px > 8.5 || pz < -8.5 || pz > 8.5);

            let moveDir = new THREE.Vector3(0, 0, 0);
            if (!isPaused && !chatFocused) { if (keys.w) moveDir.z -= 1; if (keys.s) moveDir.z += 1; if (keys.a) moveDir.x -= 1; if (keys.d) moveDir.x += 1; }
            moveDir.normalize(); moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);

            if (onLadder && (keys.w || keys.s) && !isPaused) {
                playerState = STATE.CLIMB; vel.y = keys.w ? 10 : -10;
                vel.x = moveDir.x * moveSpeed * 0.3; vel.z = moveDir.z * moveSpeed * 0.3;
            } else if (inWater) {
                playerState = STATE.SWIM; vel.x = moveDir.x * moveSpeed * 0.6; vel.z = moveDir.z * moveSpeed * 0.6;
                if (keys.space && !isPaused && !chatFocused) {
                    if (nearEdge || onLadder) { vel.y = jumpPower * 0.85; playJumpSound(); } else { if (py < -2) vel.y = 5; else vel.y = 0; }
                    keys.space = false; 
                } else { if (py > -2) vel.y -= gravity * 0.2 * dt; else vel.y = Math.sin(clock.elapsedTime * 2) * 1 - 0.5; }
            } else {
                vel.x = moveDir.x * moveSpeed; vel.z = moveDir.z * moveSpeed;
                if (isGrounded) {
                    if (keys.space && !isPaused && !chatFocused) { vel.y = jumpPower; isGrounded = false; playerState = STATE.JUMP; playJumpSound(); keys.space = false; } 
                    else if (vel.x !== 0 || vel.z !== 0) playerState = STATE.RUN; else playerState = STATE.IDLE;
                } else { vel.y -= gravity * dt; if (vel.y < 0) playerState = STATE.FALL; }
            }

            localAvatar.group.position.x += vel.x * dt; localAvatar.group.position.z += vel.z * dt; localAvatar.group.position.y += vel.y * dt;
            const newGroundY = getGroundHeight(localAvatar.group.position.x, localAvatar.group.position.z);
            
            if (currentMap === 'hall') {
                if(localAvatar.group.position.x > 48) localAvatar.group.position.x = 48;
                if(localAvatar.group.position.x < -48) localAvatar.group.position.x = -48;
                if(localAvatar.group.position.z > 48) localAvatar.group.position.z = 48;
                if(localAvatar.group.position.z < -48) localAvatar.group.position.z = -48;
            }

            if (localAvatar.group.position.y <= newGroundY) { localAvatar.group.position.y = newGroundY; vel.y = 0; isGrounded = true; } else isGrounded = false;

            if (shiftLock && !isPaused) { localAvatar.group.rotation.y = camYaw + Math.PI; } 
            else if (vel.x !== 0 || vel.z !== 0) {
                const targetYaw = Math.atan2(vel.x, vel.z); let diff = targetYaw - localAvatar.group.rotation.y;
                while(diff < -Math.PI) diff += Math.PI * 2; while(diff > Math.PI) diff -= Math.PI * 2;
                localAvatar.group.rotation.y += diff * 15 * dt;
            }
        }

        // --- ANIMATIONS ---
        const animTargets = { torsoX: 0, leftArmX: 0, rightArmX: 0, leftLegX: 0, rightLegX: 0 };
        function applyAnimationToAvatar(av, pState, t, dt) {
            animTargets.torsoX = 0;
            if (pState === STATE.IDLE) {
                animTargets.leftArmX = Math.sin(t * 2) * 0.1; animTargets.rightArmX = -Math.sin(t * 2) * 0.1;
                animTargets.leftLegX = 0; animTargets.rightLegX = 0;
            } else if (pState === STATE.RUN) {
                const speed = 11; const sA = 0.6, sL = 0.7; 
                animTargets.leftArmX = Math.sin(t * speed) * sA; animTargets.rightArmX = -Math.sin(t * speed) * sA;
                animTargets.leftLegX = -Math.sin(t * speed) * sL; animTargets.rightLegX = Math.sin(t * speed) * sL;
            } else if (pState === STATE.JUMP || pState === STATE.FALL) {
                animTargets.leftArmX = -Math.PI; animTargets.rightArmX = -Math.PI;
                animTargets.leftLegX = 0.2; animTargets.rightLegX = -0.2;
            } else if (pState === STATE.SWIM) {
                animTargets.torsoX = Math.PI / 2; const speed = 8;
                animTargets.leftArmX = -Math.PI/2 + Math.sin(t * speed)*0.5; animTargets.rightArmX = -Math.PI/2 + Math.sin(t * speed + Math.PI)*0.5;
                animTargets.leftLegX = Math.sin(t * speed)*0.5; animTargets.rightLegX = Math.sin(t * speed + Math.PI)*0.5;
            } else if (pState === STATE.CLIMB) {
                const speed = 10;
                animTargets.leftArmX = Math.PI + Math.sin(t * speed)*0.5; animTargets.rightArmX = Math.PI - Math.sin(t * speed)*0.5;
                animTargets.leftLegX = -Math.sin(t * speed)*0.5; animTargets.rightLegX = Math.sin(t * speed)*0.5;
            } else if (pState === STATE.SIT) {
                animTargets.leftArmX = 0; animTargets.rightArmX = 0;
                animTargets.leftLegX = -Math.PI / 2; animTargets.rightLegX = -Math.PI / 2;
            }

            if (av.actionTimer > 0) {
                av.actionTimer -= dt;
                if (av.equipped === 'whip') animTargets.rightArmX = THREE.MathUtils.lerp(-Math.PI / 2, Math.PI / 4, 1 - (av.actionTimer/0.5)); // Swing chop
                if (av.equipped === 'cake') animTargets.rightArmX = Math.PI / 1.5; 
            } else if (pState !== STATE.SIT) {
                if (av.equipped === 'cake' || av.equipped === 'whip') animTargets.rightArmX = Math.PI / 2.5; 
            }

            const lerpSpeed = 15 * dt; 
            av.torso.rotation.x = THREE.MathUtils.lerp(av.torso.rotation.x, animTargets.torsoX, lerpSpeed);
            av.leftArm.rotation.x = THREE.MathUtils.lerp(av.leftArm.rotation.x, animTargets.leftArmX, lerpSpeed);
            av.rightArm.rotation.x = THREE.MathUtils.lerp(av.rightArm.rotation.x, animTargets.rightArmX, lerpSpeed);
            av.leftLeg.rotation.x = THREE.MathUtils.lerp(av.leftLeg.rotation.x, animTargets.leftLegX, lerpSpeed);
            av.rightLeg.rotation.x = THREE.MathUtils.lerp(av.rightLeg.rotation.x, animTargets.rightLegX, lerpSpeed);
        }

        function updateAnimations(t, dt) {
            if (!gameActive || !localAvatar) return;
            if (!isDead) applyAnimationToAvatar(localAvatar, playerState, t, dt);
            for (let id in remotePlayers) { let p = remotePlayers[id]; if (!p.isDead) applyAnimationToAvatar(p.avatar, p.state, t, dt); }
        }

        function updateCamera() {
            if (!gameActive || !localAvatar) return;
            let targetPos = isDead ? localAvatar.torso.position.clone() : localAvatar.group.position.clone().add(new THREE.Vector3(0, 4, 0));
            if (shiftLock && !isDead) { const leftOffset = new THREE.Vector3(2, 0, 0); leftOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw); targetPos.add(leftOffset); }
            const dir = new THREE.Vector3(0, 0, 1); dir.applyAxisAngle(new THREE.Vector3(1, 0, 0), camPitch); dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
            camera.position.copy(targetPos).add(dir.multiplyScalar(camDist)); camera.lookAt(targetPos);
        }

        // --- RENDER LOOP ---
        const fpsCounter = document.getElementById('fps-counter'); let frames = 0; let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); const t = clock.elapsedTime;
            updatePhysics(dt); updateAnimations(t, dt); updateCamera(); renderer.render(scene, camera);
            frames++; const now = performance.now();
            if (now >= lastTime + 1000) { fpsCounter.innerText = "FPS: " + Math.round((frames * 1000) / (now - lastTime)); frames = 0; lastTime = now; }
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
